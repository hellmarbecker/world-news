syntax = "proto3";

message UserRecord {
    int64 timestamp = 1;
    int64 version = 2;
    string record_type = 3;
    string uid = 4;
    int32 is_subscriber = 5;
    string gender = 6;
    string age = 7;
    double latitude = 8;
    double longitude = 9;
    string place_name = 10;
    string country_code = 11;
    string timezone = 12;
}
