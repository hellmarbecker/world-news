syntax = "proto3";

message Session {
    int64 timestamp = 1;
    string record_type = 2;
    string useragent = 3;
    repeated string states_visited = 4;
    int64 sid = 5;
    string uid = 6;
    int32 is_subscriber = 7;
    string campaign = 8;
    string channel = 9;
    string gender = 10;
    string age = 11;
    double latitude = 12;
    double longitude = 13;
    string place_name = 14;
    string country_code = 15;
    string timezone = 16;

    int32 home = 17;
    int32 content = 18;
    int32 clickbait = 19;
    int32 subscribe = 20;
    int32 plusContent = 21;
    int32 affiliateLink = 22;
    int32 exitSession = 23;
}
